default:
  image: node:22-alpine
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
    policy: pull-push
  before_script:
    - npm ci --legacy-peer-deps --prefer-offline --no-audit --no-fund

stages:
  - validate
  - build
  - publish

variables:
  npm_config_cache: "$CI_PROJECT_DIR/.npm"
  # Let git clean wipe everything except the npm tarball cache.
  # node_modules/ is reinstalled by before_script in each job — sharing it
  # via artifacts produced corrupted state when extraction merged stale
  # files from a previous pipeline's leftovers in the runner's working
  # directory. Excluding only .npm avoids the file-count race with
  # git clean and stops the runner from re-downloading 200 MB of tarballs.
  GIT_CLEAN_FLAGS: -ffdx -e .npm

lint:
  stage: validate
  script:
    - npm run lint

typecheck:
  stage: validate
  script:
    - npx tsc -b

test:
  stage: validate
  script:
    - npm run test:coverage
  coverage: '/Lines\s*:\s*([\d.]+)%/'
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    paths:
      - coverage/
    expire_in: 1 week

build:
  stage: build
  needs:
    - lint
    - typecheck
    - test
  script:
    - npm run build:lib
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

# Doesn't need node_modules — just greps the dist artifact.
forbid-3rdparty-import:
  stage: build
  needs:
    - build
  before_script: []
  script:
    - |
      if grep -rIE '(3rdparty|joplin|@joplin)' dist/ ; then
        echo "ERROR: 3rdparty/Joplin reference material leaked into dist/." >&2
        exit 1
      fi
      echo "dist/ is clean."

# Doesn't need node_modules — just reads package.json with `node -p`.
version-matches-tag:
  stage: build
  before_script: []
  rules:
    - if: '$CI_COMMIT_TAG'
  script:
    - |
      PKG_VERSION=$(node -p "require('./package.json').version")
      TAG_VERSION="${CI_COMMIT_TAG#v}"
      if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
        echo "ERROR: package.json version '$PKG_VERSION' does not match tag '$CI_COMMIT_TAG'" >&2
        exit 1
      fi
      echo "Version $PKG_VERSION matches tag $CI_COMMIT_TAG"

# Doesn't need node_modules — `npm publish` packs from package.json
# `files` allowlist and uploads. Cache is unused too.
publish:
  stage: publish
  needs:
    - build
    - forbid-3rdparty-import
    - version-matches-tag
  before_script: []
  cache: []
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+(-.*)?$/'
  script:
    - echo "@inky:registry=https://${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/" > .npmrc
    - echo "//${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/:_authToken=${CI_JOB_TOKEN}" >> .npmrc
    - npm publish
