default:
  image: node:22-alpine
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/

stages:
  - validate
  - build
  - publish

variables:
  npm_config_cache: "$CI_PROJECT_DIR/.npm"
  # Don't let git clean (run between jobs) wipe cached/artifact dirs.
  # The high file count in node_modules/ and .npm/_cacache races with
  # git clean and produces 'fatal: Invalid path ... No such file or
  # directory'. Excluding both stops the race.
  GIT_CLEAN_FLAGS: -ffdx -e .npm -e node_modules

install:
  stage: validate
  script:
    - npm ci --legacy-peer-deps
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour

lint:
  stage: validate
  needs:
    - install
  script:
    - npm run lint

typecheck:
  stage: validate
  needs:
    - install
  script:
    - npx tsc -b

test:
  stage: validate
  needs:
    - install
  script:
    - npm run test:coverage
  coverage: '/Lines\s*:\s*([\d.]+)%/'
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    paths:
      - coverage/
    expire_in: 1 week

build:
  stage: build
  needs:
    - install
    - lint
    - typecheck
    - test
  script:
    - npm run build:lib
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

forbid-3rdparty-import:
  stage: build
  needs:
    - build
  script:
    - |
      if grep -rIE '(3rdparty|joplin|@joplin)' dist/ ; then
        echo "ERROR: 3rdparty/Joplin reference material leaked into dist/." >&2
        exit 1
      fi
      echo "dist/ is clean."

version-matches-tag:
  stage: build
  needs:
    - install
  rules:
    - if: '$CI_COMMIT_TAG'
  script:
    - |
      PKG_VERSION=$(node -p "require('./package.json').version")
      TAG_VERSION="${CI_COMMIT_TAG#v}"
      if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
        echo "ERROR: package.json version '$PKG_VERSION' does not match tag '$CI_COMMIT_TAG'" >&2
        exit 1
      fi
      echo "Version $PKG_VERSION matches tag $CI_COMMIT_TAG"

publish:
  stage: publish
  needs:
    - build
    - forbid-3rdparty-import
    - version-matches-tag
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+(-.*)?$/'
  script:
    - echo "@inky:registry=https://${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/" > .npmrc
    - echo "//${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/packages/npm/:_authToken=${CI_JOB_TOKEN}" >> .npmrc
    - npm publish
