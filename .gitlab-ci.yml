default:
  image: node:22-alpine

stages:
  - test
  - release
  - publish

# One job runs everything that depends on node_modules: install, lint,
# typecheck, unit tests, library build, and the external-source leak check.
# Sequential in a fresh container — no node_modules artifact to share,
# no cache to go stale, no inter-job state. The runner has only one
# concurrent slot anyway, so we lose nothing by giving up parallelism.
test:
  stage: test
  script:
    - npm ci --legacy-peer-deps --no-audit --no-fund
    - npm run lint
    - npx tsc -b
    - npm run test:coverage
    - npm run build:lib
    - |
      if grep -rIE '(joplin|@joplin)' dist/ ; then
        echo "ERROR: external editor source marker leaked into dist/." >&2
        exit 1
      fi
      echo "dist/ is clean."
  coverage: '/Lines\s*:\s*([\d.]+)%/'
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    paths:
      - dist/
      - coverage/
    expire_in: 1 week

# Tag-only — verify package.json version matches the tag.
# Doesn't need node_modules; just reads package.json with `node -p`.
version-matches-tag:
  stage: test
  rules:
    - if: '$CI_COMMIT_TAG'
  script:
    - |
      PKG_VERSION=$(node -p "require('./package.json').version")
      TAG_VERSION="${CI_COMMIT_TAG#v}"
      if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
        echo "ERROR: package.json version '$PKG_VERSION' does not match tag '$CI_COMMIT_TAG'" >&2
        exit 1
      fi
      echo "Version $PKG_VERSION matches tag $CI_COMMIT_TAG"

# Main-branch release. semantic-release computes the next version from
# Conventional Commits, updates release metadata, creates the Git tag and
# GitLab release, and publishes the package to the GitLab npm registry.
release:
  stage: release
  needs:
    - job: test
      artifacts: true
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  variables:
    NPM_TOKEN: ${CI_JOB_TOKEN}
  script:
    - apk add --no-cache git
    - npm ci --legacy-peer-deps --no-audit --no-fund
    - git fetch --prune-tags
    - |
      {
        echo "@inky:registry=${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/npm/"
        echo "${CI_API_V4_URL#https:}/projects/${CI_PROJECT_ID}/packages/npm/:_authToken=${CI_JOB_TOKEN}"
      } > .npmrc
    - npm run semantic-release

pages:
  stage: publish
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - npm ci --legacy-peer-deps --no-audit --no-fund
    - npm run build-storybook
    - npm --prefix docs-site ci --no-audit --no-fund
    - npm --prefix docs-site run build
    - rm -rf public
    - mkdir public
    - cp -R docs-site/dist/. public/
    - mkdir -p public/storybook
    - cp -R storybook-static/. public/storybook/
  artifacts:
    paths:
      - public
    expire_in: 1 week
