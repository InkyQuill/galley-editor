name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci --legacy-peer-deps --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc -b

      - name: Unit tests
        run: npm run test:coverage

      - name: Library build
        run: npm run build:lib

      - name: Verify package contents
        run: ./scripts/verify-publish.sh

      - name: Forbid external-source markers in dist
        run: |
          if grep -rIE '(joplin|@joplin)' dist/ ; then
            echo "ERROR: external editor source marker leaked into dist/." >&2
            exit 1
          fi
          echo "dist/ is clean."

      - name: Storybook build
        run: npm run build-storybook

      - name: Docs install
        run: npm --prefix docs-site ci --no-audit --no-fund

      - name: Docs build
        env:
          GALLEY_DOCS_SITE: https://inkyquill.github.io
          GALLEY_DOCS_BASE: /galley-editor
        run: npm run docs:build

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore
