name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Pages artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci --legacy-peer-deps --no-audit --no-fund

      - name: Build Storybook
        run: npm run build-storybook

      - name: Install docs dependencies
        run: npm --prefix docs-site ci --no-audit --no-fund

      - name: Build docs
        env:
          GALLEY_DOCS_SITE: https://inkyquill.github.io
          GALLEY_DOCS_BASE: /galley-editor
        run: npm run docs:build

      - name: Assemble Pages artifact
        run: |
          rm -rf public
          mkdir public
          cp -R docs-site/dist/. public/
          mkdir -p public/storybook
          cp -R storybook-static/. public/storybook/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    name: Deploy Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
